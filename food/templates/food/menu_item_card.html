<article class="menu-card">
    <div class="menu-image">
        {% if item.image_url %}
            <img src="{{ item.image_url }}" alt="{{ item.name }}">
        {% endif %}
        {% if item.is_featured %}
            <span class="floating-badge">Featured</span>
        {% endif %}
    </div>
    <div class="menu-body">
        <div class="menu-title-row">
            <h3>{{ item.name }}</h3>
            <strong>&#8377;{{ item.price }}</strong>
        </div>
        <p>{{ item.description }}</p>
        <div class="tag-row">
            {% for label in item.label_list %}
                <span>{{ label }}</span>
            {% endfor %}
            {% if item.calories %}
                <span>{{ item.calories }} cal</span>
            {% endif %}
        </div>
        <div class="menu-actions">
            <a class="text-link" href="{{ item.restaurant.get_absolute_url }}">{{ item.restaurant.name }}</a>
            <button class="add-button js-add-cart" type="button" data-item-id="{{ item.id }}">
                <i data-lucide="plus"></i>
                <span>Add</span>
            </button>
        </div>
    </div>
</article>
